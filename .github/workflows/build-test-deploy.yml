name: Build test and deploy

on:
  push:
    branches:
      - '**'

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: {{ECR_REPO_NAME}}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run
        env:
          CI: true
          AUTH_DISABLED: true
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO: Migrate to OIDC authentication (aws-actions/configure-aws-credentials
      # supports role-to-assume with id-token: write permission). Requires IAM
      # OIDC provider setup in AWS.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS Express
        uses: amazon-ecs-deploy-express-service@v1
        with:
          service: ${{ secrets.ECS_SERVICE_ARN }}
          task-execution-role: ${{ secrets.ECS_TASK_EXECUTION_ROLE_ARN }}
          infrastructure-role: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
          wait-for-stability: true

      - name: Configure ALB idle timeout for SSE streaming
        run: |
          aws elbv2 modify-load-balancer-attributes \
            --load-balancer-arn ${{ secrets.LOAD_BALANCER_ARN }} \
            --attributes Key=idle_timeout.timeout_seconds,Value=120

      - name: Verify deployment health
        run: |
          HEALTH_URL="${{ secrets.HEALTH_CHECK_URL }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i: HTTP $STATUS (waiting 10s...)"
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
